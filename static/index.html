<!DOCTYPE html>
<html lang="en">

    <title>KittenTTS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="/">KittenTTS</a>
        <a href="/docs" target="_blank">Swagger UI</a>
